# This workflow compiles the ToDoApp and WeatherApp projects in parallel jobs
# to optimize and reduce CI build times on GitHub Actions.

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-todo:
    name: Build ToDoApp
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle Cache
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build ToDoApp
      run: |
        cd ToDoApp
        chmod +x gradlew
        ./gradlew assembleDebug

  build-weather:
    name: Build WeatherApp
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle Cache
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build WeatherApp
      run: |
        cd WeatherApp
        chmod +x gradlew
        ./gradlew assembleDebug
